<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Food Truck Finder</title>
  <meta name="theme-color" content="#111111" />
  <style>
    :root {
      --bg: #f6efe4;
      --card: rgba(255, 248, 240, 0.92);
      --text: #171311;
      --muted: #6f625a;
      --accent: #d96f3d;
      --accent-dark: #b95c2f;
      --border: rgba(23, 19, 17, 0.08);
      --shadow: 0 18px 50px rgba(23, 19, 17, 0.12);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(217,111,61,0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(23,19,17,0.08), transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 28px 22px 22px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(217,111,61,0.12);
      color: var(--accent-dark);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, #1e1815, #111111);
      color: #fff7ef;
      display: grid;
      place-items: center;
      font-size: 32px;
      box-shadow: 0 12px 24px rgba(17,17,17,0.18);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .status {
      margin-top: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .subtle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      min-height: 52px;
      padding: 0 18px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:active {
      transform: translateY(1px) scale(0.995);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn-secondary {
      background: rgba(23, 19, 17, 0.08);
      color: var(--text);
    }

    .btn-store {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .stores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 420px) {
      .stores {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Food Truck Finder</div>
    <div class="logo">🚚</div>
    <h1>Opening the app</h1>
    <p id="message">Getting your truck page ready now.</p>
    <div class="status" id="status">Trying to open Food Truck Finder...</div>
    <div class="subtle">If nothing happens, use one of the buttons below.</div>

    <div class="actions">
      <a class="btn btn-primary" id="open-app" href="#">Open in App</a>
      <a class="btn btn-secondary" href="https://www.ftf-foodtruckfinder.com/">Visit Website</a>
    </div>

    <div class="stores">
      <a class="btn btn-store" id="app-store" href="https://apps.apple.com/us/app/ftf-food-truck-finder/id6742719545
FTF: Food Truck Finder">App Store</a>
      <a class="btn btn-store" id="play-store" href="https://play.google.com/store/apps/details?id=com.innoryzen.foodtruckfinder">Google Play</a>
    </div>

    <div class="footer">Best experience is in the Food Truck Finder app.</div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var truckId = params.get('truck');
      var truckName = params.get('name');

      var appUrl = truckId
        ? 'foodtruckfinder://truck/' + encodeURIComponent(truckId)
        : 'foodtruckfinder://';

      var message = document.getElementById('message');
      var status = document.getElementById('status');
      var openApp = document.getElementById('open-app');

      if (truckName) {
        message.textContent = 'Opening ' + truckName + ' in Food Truck Finder.';
      }

      openApp.href = appUrl;

      setTimeout(function () {
        window.location.href = appUrl;
      }, 250);

      setTimeout(function () {
        status.textContent = 'App not opening yet? Tap below to keep going.';
      }, 1600);
    })();
  </script>
</body>
</html>
